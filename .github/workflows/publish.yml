name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "FILE_VERSION=$version.0" >> $env:GITHUB_OUTPUT

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish JiraWatcher/JiraWatcher.csproj `
            -c Release `
            -r win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:FileVersion=${{ steps.version.outputs.FILE_VERSION }} `
            -p:PublishReadyToRun=false `
            -o publish/

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish/JiraWatcher.exe -DestinationPath publish/JiraWatcher-${{ steps.version.outputs.VERSION }}-win-x86.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: JiraWatcher ${{ steps.version.outputs.VERSION }}
          files: publish/JiraWatcher-${{ steps.version.outputs.VERSION }}-win-x86.zip
          generate_release_notes: true
